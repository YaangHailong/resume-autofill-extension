<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock English Application</title>
  </head>
  <body>
    <main>
      <h1>Application Form</h1>
      <label for="full-name">Full name</label>
      <input id="full-name" name="fullName" />
      <label for="email">Email</label>
      <input id="email" type="email" name="email" />
      <label for="phone">Phone</label>
      <input id="phone" type="tel" name="phone" />
      <label for="portfolio">Portfolio</label>
      <input id="portfolio" type="url" name="website" />
      <label for="summary">Profile summary</label>
      <textarea id="summary" name="summary"></textarea>
      <section>
        <h2>Certifications</h2>
        <label>Certificate name <input name="certificationName" /></label>
        <button type="button">Add certification</button>
      </section>
    </main>
  </body>
</html>
