<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模拟中文简历表单</title>
    <style>
      body {
        margin: 0;
        background: #f5f7fa;
        color: #17202a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(860px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      section {
        margin-top: 18px;
        padding: 18px 0;
        border-bottom: 1px solid #d8e0e8;
      }

      label {
        display: grid;
        gap: 6px;
        margin: 10px 0;
      }

      input,
      textarea,
      select,
      button {
        font: inherit;
      }

      input,
      textarea,
      select {
        min-height: 38px;
        border: 1px solid #c8d2df;
        border-radius: 6px;
        padding: 8px 10px;
        background: #fff;
      }

      textarea {
        min-height: 90px;
      }

      button {
        border: 1px solid #1d6f8f;
        border-radius: 6px;
        padding: 8px 12px;
        background: #fff;
        color: #1d6f8f;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>候选人简历</h1>
      <section>
        <h2>基本信息</h2>
        <label>姓名 <input name="candidate_name" /></label>
        <label>手机号 <input name="mobile" type="tel" /></label>
        <label>邮箱 <input name="email" type="email" /></label>
        <label>所在地 <input name="city" /></label>
        <label>个人简介 <textarea name="summary"></textarea></label>
      </section>

      <section id="certificates">
        <h2>证书</h2>
        <div class="certificate-row">
          <label>证书名称 <input name="certificate_name[]" /></label>
          <label>颁发机构 <input name="certificate_issuer[]" /></label>
        </div>
        <button type="button" id="add-certificate">添加证书</button>
      </section>

      <section>
        <h2>教育经历</h2>
        <label>学校 <input name="school" /></label>
        <label>学历
          <select name="degree">
            <option></option>
            <option>本科</option>
            <option>硕士</option>
          </select>
        </label>
      </section>
    </main>

    <script>
      document.getElementById("add-certificate").addEventListener("click", function () {
        var row = document.createElement("div");
        row.className = "certificate-row";
        row.innerHTML =
          '<label>证书名称 <input name="certificate_name[]" /></label>' +
          '<label>颁发机构 <input name="certificate_issuer[]" /></label>';
        document.getElementById("certificates").insertBefore(row, this);
      });
    </script>
  </body>
</html>
